<!DOCTYPE html>
<html>
<head>
    <title>Random HTML</title>
</head>
<body>

<h1>Simple Random Number Generator</h1>
<h2>bug branch changed</h2>
<button onclick="generateNumber()">Generate</button>

<p id="result"></p>

<script>
function generateNumber() {
    var num = Math.floor(Math.random() * 100);
    document.getElementById("result").innerText = "Random Number: " + num;
}
</script>

</body>
</html>
